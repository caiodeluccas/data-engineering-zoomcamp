services:
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ny_taxi_green
    volumes:
      - ny_taxi_green_postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - hw-network

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8085:80"
    networks:
      - hw-network
    depends_on:
      - pgdatabase

  taxi_ingest:
    image: taxi_ingest:v001
    networks:
      - hw-network
    depends_on:
      - pgdatabase
    command:
      - "--pg-user=root"
      - "--pg-password=root"
      - "--pg-host=pgdatabase"
      - "--pg-port=5432"
      - "--pg-db=ny_taxi_green"
  
volumes:
  ny_taxi_green_postgres_data:
  pgadmin_data:

networks:
  hw-network: